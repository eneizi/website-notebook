<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Notebook</title>
</head>
<body>
    <section class="notebook-container">
        <div class="notebook-block">
            <h1>Записная книжка</h1>
            <div class="input-wrapper">
                <textarea class="notebook-input" placeholder="Ваши заметки..."></textarea>
            </div>
            <button class="add-note">Добавить заметку</button>
            <button class="remove-input">Отчистить поле ввода</button>
            <ul class="notebook-data"></ul>
        </div>
    </section>


    <script src="scripts/script.js"></script>
</body>
</html>
